<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Meta Data -->
  <title>BUNNY MD - Pair Your Device</title>
  <meta name="description" content="Pair your WhatsApp to BUNNY MD. Fast, secure, and reliable WhatsApp bot with QR and Pair Code support.">
  <meta name="theme-color" content="#000000">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bunny-md.onrender.com/pair">
  <meta property="og:title" content="BUNNY MD - Pair Your Device">
  <meta property="og:description" content="Pair your WhatsApp to BUNNY MD. Fast, secure, and reliable WhatsApp bot.">
  <meta property="og:image" content="https://i.ibb.co/Mdg2Fkd/file-00000000f41871fdb744b8a6b7b612fa.png">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="BUNNY MD - Pair Your Device">
  <meta property="twitter:description" content="Pair your WhatsApp to BUNNY MD. Fast, secure, and reliable WhatsApp bot.">
  <meta property="twitter:image" content="https://i.ibb.co/Mdg2Fkd/file-00000000f41871fdb744b8a6b7b612fa.png">

  <link rel="icon" href="https://i.ibb.co/Mdg2Fkd/file-00000000f41871fdb744b8a6b7b612fa.png">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary: #E50914;
      --dark: #000000;
      --dark-2: #141414;
      --gray: #808080;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://i.ibb.co/Mdg2Fkd/file-00000000f41871fdb744b8a6b7b612fa.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* Loading Screen */
    .loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid var(--dark-2);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 8px;
      padding: 60px 40px;
      box-shadow: 0 0 30px rgba(229, 9, 20, 0.3);
      border: 1px solid #222;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 2px solid var(--primary);
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .logo p {
      color: var(--gray);
      font-size: 14px;
      margin-top: 5px;
    }

    .status {
      text-align: center;
      padding: 12px;
      background: var(--dark-2);
      border-radius: 4px;
      margin-bottom: 25px;
      font-size: 14px;
      font-weight: 500;
      border-left: 3px solid var(--primary);
    }

    .qr-box {
      background: var(--white);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      text-align: center;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-box img {
      max-width: 220px;
      width: 100%;
      border-radius: 4px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: var(--gray);
      font-size: 14px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }

    .divider span {
      padding: 0 15px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--gray);
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      background: #333;
      border: none;
      border-radius: 4px;
      color: var(--white);
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      background: #454545;
      box-shadow: 0 0 0 2px var(--primary);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 4px;
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: #f40612;
      transform: scale(1.02);
    }

    .btn:disabled {
      background: #333;
      cursor: not-allowed;
      transform: none;
    }

    .code-display {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 8px;
      padding: 20px;
      background: var(--dark-2);
      border-radius: 4px;
      margin-top: 20px;
      border: 1px dashed var(--primary);
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: var(--gray);
      font-size: 12px;
    }

    .error {
      color: #ff3b30;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loader-wrapper" id="loader">
    <div class="loader"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <div class="logo">
      <img src="https://i.ibb.co/Mdg2Fkd/file-00000000f41871fdb744b8a6b7b612fa.png" alt="BUNNY MD">
      <h1>BUNNY MD</h1>
      <p>Pair Your WhatsApp Device</p>
    </div>

    <div class="status" id="status">Connecting to server...</div>

    <div class="qr-box" id="qrBox">
      <p style="color: #333;">Waiting for QR Code...</p>
    </div>

    <div class="divider"><span>OR</span></div>

    <div class="input-group">
      <label for="phoneNumber">Enter WhatsApp Number with Country Code</label>
      <input type="text" id="phoneNumber" placeholder="e.g. 255712345678" autocomplete="off">
    </div>

    <button class="btn" id="getCodeBtn">Get Pair Code</button>
    <div class="code-display" id="codeDisplay"></div>
    <div class="error" id="error"></div>

    <div class="footer">
      BUNNY MD © 2026. Secure WhatsApp Bot.
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const statusEl = document.getElementById('status');
    const qrBox = document.getElementById('qrBox');
    const getCodeBtn = document.getElementById('getCodeBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const codeDisplay = document.getElementById('codeDisplay');
    const errorEl = document.getElementById('error');
    const loader = document.getElementById('loader');

    // Hide loader when page loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }, 800);
    });

    // Socket events
    socket.on('status', (msg) => {
      statusEl.textContent = msg;
      if (msg === 'Connected') {
        statusEl.style.borderLeftColor = '#00C851';
        qrBox.innerHTML = '<p style="color: #00C851; font-weight: 600;">✅ Device Paired Successfully!</p>';
        getCodeBtn.disabled = true;
      }
    });

    socket.on('qr', (qrImage) => {
      qrBox.innerHTML = `<img src="${qrImage}" alt="Scan QR Code">`;
      statusEl.textContent = 'Scan QR with WhatsApp';
    });

    socket.on('pair_code', (code) => {
      codeDisplay.style.display = 'block';
      codeDisplay.textContent = code;
      statusEl.textContent = 'Enter this code in WhatsApp';
      errorEl.textContent = '';
    });

    socket.on('pair_error', (err) => {
      errorEl.textContent = err;
      getCodeBtn.disabled = false;
    });

    // Get Pair Code
    getCodeBtn.addEventListener('click', () => {
      const phoneNumber = phoneInput.value.trim().replace(/[^0-9]/g, '');
      if (phoneNumber.length < 10) {
        errorEl.textContent = 'Please enter a valid number with country code';
        return;
      }
      errorEl.textContent = '';
      getCodeBtn.disabled = true;
      getCodeBtn.textContent = 'Generating...';
      socket.emit('request_pair_code', phoneNumber);
      
      setTimeout(() => {
        getCodeBtn.disabled = false;
        getCodeBtn.textContent = 'Get Pair Code';
      }, 5000);
    });
  </script>
</body>
</html>
